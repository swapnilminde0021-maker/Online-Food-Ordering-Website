<!DOCTYPE html>
<html>
<head>
<title>FoodieHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>🍔 FoodieHub</h1>
</header>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400">
<h3>Pizza</h3>
<p>₹250</p>
<button onclick="addToCart('Pizza',250)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400">
<h3>Burger</h3>
<p>₹150</p>
<button onclick="addToCart('Burger',150)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=400">
<h3>Pasta</h3>
<p>₹200</p>
<button onclick="addToCart('Pasta',200)">Add to Cart</button>
</div>

</div>

<div class="cart-box">
<h2>🛒 Cart</h2>
<ul id="cart"></ul>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">
Checkout
</button>
</div>

<script src="script.js"></script>

</body>
</html>
